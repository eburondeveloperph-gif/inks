version: '3.8'

services:
  # FastAPI Backend with whisper.cpp
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: eburon-backend
    ports:
      - "3002:3002"
    volumes:
      - backend-data:/app/data
      - model-cache:/app/models
      - upload-cache:/app/uploads
    environment:
      - MODEL_DIR=/app/models
      - UPLOAD_DIR=/app/uploads
      - DEFAULT_MODEL=ggml-base.en.bin
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s

  # Frontend (Nginx)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: eburon-frontend
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: always
    environment:
      - API_URL=http://backend:3002

volumes:
  backend-data:
  model-cache:
  upload-cache: